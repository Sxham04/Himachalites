        margin-bottom: 40px;
    }

    .map-wrapper {
        position: relative;
    }

    #hp-interactive-map {
        width: 100%;                /* Map takes full width of the container */
        height: auto;
        display: block;             /* Removes inline spacing */
        overflow: visible;          /* Allows districts to scale without clipping */
    }

    .district-link {
        transition: transform 0.3s ease;
        /* Ensures individual pieces scale correctly without shifting */
        transform-box: fill-box;
        transform-origin: center;
    }

    .district {
        fill: #ffffff;
        stroke: #333;
        stroke-width: 1;
        transition: all 0.3s ease;
        cursor: pointer;
        /* Keeps border consistent even if shape is scaled */
        vector-effect: non-scaling-stroke; 
    }

    /* Hover State */
    .district:hover {
        fill: #0EA63C !important;
        stroke: #fff;
        stroke-width: 2;
        transform: scale(1.05); /* Increased slightly for better visual feedback */
    }

    /* Active Page State */
    .district.is-active {
        fill: #0EA63C;
        stroke: #000;
        stroke-width: 2;
        filter: url(#active-glow);
    }

    /* Floating Tooltip */
    #district-tooltip {
        position: fixed;
        background: #222;
        color: #fff;
        padding: 8px 15px;
        border-radius: 4px;
        font-family: 'Kalam', cursive;
        font-size: 1rem;
        pointer-events: none;
        opacity: 0;
        z-index: 9999;
        transition: opacity 0.2s ease;
    }
</style>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tooltip = document.getElementById('district-tooltip');
        const districtLinks = document.querySelectorAll('.district-link');
        const districts = document.querySelectorAll('.district');

        // 1. Tooltip Movement logic
        districtLinks.forEach(link => {
            link.addEventListener('mousemove', (e) => {
                const name = link.getAttribute('data-name');
                tooltip.textContent = name;
                tooltip.style.opacity = '1';
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
            });

            link.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
        });

        // 2. Automated Active Detection
        // This looks at your current URL and matches it to the link href
        const currentPath = window.location.pathname;
        districts.forEach(district => {
            const link = district.parentElement.getAttribute('href');
            if (currentPath.includes(link)) {
                district.classList.add('is-active');
            }
        });
    });
</script>
